name: cng_live
description: "CNG LIVE — Community-powered live CNG pump status for Coimbatore drivers."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_messaging: ^15.0.4

  # Location & Maps
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  google_maps_flutter: ^2.9.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4

  # Forms
  pin_code_fields: ^8.0.1

  # Notifications
  flutter_local_notifications: ^17.2.2

  # UI Polish
  cached_network_image: ^3.4.0
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1

  # Utility
  intl: ^0.19.0
  connectivity_plus: ^6.0.5
  uuid: ^4.4.2

  # Required by already-approved code (models use Equatable; theme
  # system uses google_fonts; app_logger.dart uses logger) — not all in
  # the originally requested list, kept so the existing approved files
  # still compile.
  equatable: ^2.0.5
  google_fonts: ^6.2.1
  logger: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
